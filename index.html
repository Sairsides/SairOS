<!DOCTYPE html>
<html>

  <head>
    <script type="module" src="./script.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>

  <body style="background-color: #C2DDF2; margin: 0; min-height: 100vh; font-family: Gill Sans, sans-serif; background-image: url(./SairOSwallpaper.jpg); background-repeat: no-repeat; background-size: cover;">

        <div id="desktopApps" style="padding-top: 50px; padding-left: 20px; display: flex; flex-direction: column; gap: 15px;">

      <div class="desktop-icon">
        <img src="./NoteApplogo.jpg" alt="Notes Logo">
        <p>Notes</p>
      </div>

    </div>

    <div class="window" id="WelcomeWindow" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">

      <div class="windowheader" id="WelcomeWindowheader">
        
        <div style="display: flex; gap: 8px; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);">
            <div class="closebutton" id="welcomeclose" title="Close"></div>
            <div style="width: 12px; height: 12px; background-color: #ffbd2e; border-radius: 50%; cursor: pointer;" title="Minimize"></div>
            <div style="width: 12px; height: 12px; background-color: #27c93f; border-radius: 50%; cursor: pointer;" title="Maximize"></div>
        </div>
      
        SairOS Welcome Window
      </div>

        
      <img style="width: 200px; height: 200px; float: right; padding: 4px" src="./SairOSlogo.png" />
      <h1 style="color: #194B75; padding: 4px; margin: 4px">Welcome to  SairOS</h1>
      <h2 style="color: #194B75; padding: 4px; margin: 4px">A web based OS that is made by Sair</h2>
      <h3 style="color: #194B75; padding: 4px; margin: 4px">Happy to connect on Linkedin</h3>
      <a href="https://www.linkedin.com/in/kurshad-yusifbayli-1b7bb73b5/" style="font-size: 14px; padding: 4px; margin: 4px;">My Linkedin</a>
      <br>
      
    </div>

    <div class="window" id="NotesWindow" style="position: absolute; top: 45%; left: 45%; transform: translate(-50%, -50%); display: none;">

      <div class="windowheader" id="NotesWindowheader">
        
        <div style="display: flex; gap: 8px; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);">

            <div class="closebutton" id="notesclose" title="Close"></div>
            <div style="width: 12px; height: 12px; background-color: #ffbd2e; border-radius: 50%; cursor: pointer;" title="Minimize"></div>
            <div style="width: 12px; height: 12px; background-color: #27c93f; border-radius: 50%; cursor: pointer;" title="Maximize"></div>
        </div>
      
        Notes
      </div>

      <div style="margin: 8px; background-color: #ffffff; border-radius: 8px; box-sizing: border-box; height: 300px; padding: 12px;">
        <h2 style="color: #194B75; margin-top: 0; font-size: 18px;">Cyber Notes</h2>
        <textarea style="width: 100%; height: 200px; border: none; outline: none; resize: none; font-family: sans-serif; font-size: 14px; background: transparent;" placeholder="Type your text notes here..."></textarea>
      </div>
      
    </div>

    <div style="display: flex; position: fixed; top: 0; left: 0; width: 100%; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); background-color: rgba(12, 12, 12, 0.4); color: #fff; height: 40px; box-sizing: border-box; z-index: 9999;">

      <p id="welcomeopen" style="margin-left: 16px; font-weight: bold; margin-top: 0; margin-bottom: 0;">SairOS</p>
      <p id="timeText" style="margin-right: 16px; margin-top: 0; margin-bottom: 0;">Time</p>

    </div>
    
    <script src="script.js"></script>

  </body>

</html>
